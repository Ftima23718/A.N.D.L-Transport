spring:
  application:
    name: andl-transport
  profiles:
    active: h2

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:andl_transport}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@andl.ma}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:andl-transport-very-long-secret-key-2024-security}
  expiration: 86400000

app:
  name: "A.N.D.L Transport"
  association: "جمعية النهضة و التنمية لقويرات"
  association-fr: "Association Nahda et Développement Lkouirate"
  abreviation: "A.N.D.L"
  upload-dir: ./uploads

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ma.andl: DEBUG
    org.springframework.security: INFO
